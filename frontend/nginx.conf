server {
    listen 80;
    server_name localhost servofixo.cloud www.servofixo.cloud;

    # Redirect all HTTP traffic to HTTPS (Only works if SSL is set up)
    location / {
        return 301 https://$host$request_uri;
    }

    # Internal health check or fallback for local dev if HTTPS isn't used
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name localhost servofixo.cloud www.servofixo.cloud;

    # SSL Certificate paths (mapped from AWS host)
    ssl_certificate /etc/letsencrypt/live/servofixo.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/servofixo.cloud/privkey.pem;

    # Standard SSL optimizations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /v1/ {
        proxy_pass http://backend:5000/api/v1/;   
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FIXED Socket.io Configuration
    location /socket.io/ {
        proxy_pass http://backend:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade"; # Must be capital "Upgrade" for some clients
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for real-time performance
        proxy_buffering off;
        proxy_cache_off;
    }
}