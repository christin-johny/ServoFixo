services:
  redis:
    image: redis:alpine
    container_name: servofixo_redis
    ports:
      - "6379:6379"
    networks:
      - servofixo_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: servofixo_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    networks:
      - servofixo_net
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: servofixo_frontend
    ports:
      - "80:80"
    networks:
      - servofixo_net
    depends_on:
      - backend

networks:
  servofixo_net:
    driver: bridge

volumes:
  redis_data: